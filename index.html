<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>成品相簿</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./public/styles.css?v=20260425l" />
  </head>
  <body>
    <div class="page-shell">
      <aside class="side-nav" aria-label="照片分類導覽">
        <details class="side-nav-panel" open>
          <summary class="side-nav-summary">
            <div>
              <p class="side-nav-eyebrow">Quick Jump</p>
              <h2 class="side-nav-title">分類列表</h2>
            </div>
            <span class="side-nav-summary-icon" aria-hidden="true"></span>
          </summary>
          <nav id="category-nav" class="category-nav"></nav>
        </details>
      </aside>

      <div class="content-shell">
        <header class="hero">
          <div class="hero-copy">
            <p class="eyebrow">Photo Gallery</p>
            <h1 id="gallery-title">南區小火照片 by.許晉豪</h1>
            <p class="hero-text" id="gallery-summary">正在載入照片分類...</p>
            <a
              class="social-link"
              href="https://www.instagram.com/pro_spihao1239/"
              target="_blank"
              rel="noreferrer"
              aria-label="Instagram @pro_spihao1239"
            >
              <span class="social-link-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img" focusable="false">
                  <path
                    d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2Zm0 1.75A4 4 0 0 0 3.75 7.75v8.5a4 4 0 0 0 4 4h8.5a4 4 0 0 0 4-4v-8.5a4 4 0 0 0-4-4h-8.5Zm8.9 1.35a1.1 1.1 0 1 1 0 2.2 1.1 1.1 0 0 1 0-2.2ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 1.75A3.25 3.25 0 1 0 12 15.25 3.25 3.25 0 0 0 12 8.75Z"
                    fill="currentColor"
                  />
                </svg>
              </span>
              <span class="social-link-label">@pro_spihao1239</span>
            </a>
          </div>
        </header>
        <main id="gallery-root" class="gallery-root" aria-live="polite"></main>
      </div>
    </div>

    <template id="category-template">
      <section class="category-section">
        <div class="category-header">
          <div>
            <h2 class="category-title"></h2>
            <p class="category-count"></p>
          </div>
          <button class="category-download-button" type="button" data-role="download-all">
            全部下載
          </button>
        </div>
        <div class="photo-grid"></div>
        <p class="category-empty" hidden>目前尚未放入照片。</p>
      </section>
    </template>

    <template id="card-template">
      <article class="photo-card">
        <button class="photo-button" type="button">
          <img class="photo-image" alt="" loading="lazy" />
        </button>
        <div class="photo-meta">
          <p class="photo-name"></p>
          <div class="photo-actions">
            <a class="action-button" data-role="download" download>下載</a>
            <button class="action-button secondary" type="button" data-role="share">分享</button>
          </div>
        </div>
      </article>
    </template>

    <dialog id="lightbox" class="lightbox">
      <form method="dialog" class="lightbox-panel">
        <button class="lightbox-close" type="submit" aria-label="關閉">×</button>
        <button id="lightbox-prev" class="lightbox-nav lightbox-nav-prev" type="button" aria-label="上一張">‹</button>
        <button id="lightbox-next" class="lightbox-nav lightbox-nav-next" type="button" aria-label="下一張">›</button>
        <img id="lightbox-image" class="lightbox-image" alt="" />
        <div class="lightbox-footer">
          <div>
            <p id="lightbox-title" class="lightbox-title"></p>
            <p id="lightbox-category" class="lightbox-subtitle"></p>
          </div>
          <div class="photo-actions">
            <a id="lightbox-download" class="action-button" download>下載</a>
            <button id="lightbox-share" class="action-button secondary" type="button">分享</button>
          </div>
        </div>
      </form>
    </dialog>

    <button id="scroll-to-top" class="scroll-to-top-button" type="button" aria-label="移動到最上方">
      ↑
    </button>

    <script src="./gallery-data.js?v=20260425l"></script>
    <script type="module" src="./public/app.js?v=20260425l"></script>
  </body>
</html>
